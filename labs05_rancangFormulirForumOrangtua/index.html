<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <link rel="stylesheet" href="/LernCSS_Freecodecamp/labs05_rancangFormulirForumOrangtua/style.css">
</head>
<body>
    <!-- Poin 1: Elemen div dengan kelas container -->
    <div class="container">
        <h1>Job Application</h1>
        
        <!-- Poin 2: Elemen form di dalam container -->
        <form id="job-app-form">
            
            <!-- Poin 3 & 9: Input text dengan id 'name' beserta labelnya -->
            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>

            <!-- Poin 4 & 9: Input email dengan id 'email' beserta labelnya -->
            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email address">
            </div>

            <!-- Poin 5 & 9: Elemen select dengan id 'position' beserta labelnya -->
            <div class="form-group">
                <label for="position">Job Position:</label>
                <select id="position" name="position" required>
                    <option value="" disabled selected>Select a position</option>
                    <option value="frontend">Frontend Developer</option>
                    <option value="backend">Backend Developer</option>
                    <option value="designer">UI/UX Designer</option>
                </select>
            </div>

            <!-- Poin 6: Elemen fieldset dengan kelas radio-group -->
            <fieldset class="radio-group">
                <legend>Availability</legend>
                
                <!-- Poin 7: Kelompok input radio dengan name 'availability' -->
                <div class="radio-option">
                    <input type="radio" id="full-time" name="availability" value="full-time" required>
                    <!-- Poin 9: Label yang berasosiasi dengan input radio -->
                    <label for="full-time">Full-Time</label>
                </div>
                
                <div class="radio-option">
                    <input type="radio" id="part-time" name="availability" value="part-time">
                    <!-- Poin 9: Label yang berasosiasi dengan input radio -->
                    <label for="part-time">Part-Time</label>
                </div>
            </fieldset>

            <!-- Poin 8 & 9: Elemen textarea dengan id 'message' beserta labelnya -->
            <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="4" required placeholder="Enter your message"></textarea>
            </div>

            <!-- Poin 10: Elemen button dengan jenis submit -->
            <button type="submit">Submit Application</button>
        </form>
    </div>
</body>
</html>
