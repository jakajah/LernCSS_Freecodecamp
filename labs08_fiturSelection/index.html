<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Feature Selection Lab</title>
    <!-- Menautkan file CSS ke HTML -->
    <link rel="stylesheet" href="/LernCSS_Freecodecamp/labs08_fiturSelection/styles.css"/>
</head>
<body>

    <!-- 1 & 2. Elemen h1 dengan teks persis "Feature Selection" -->
    <h1>Feature Selection</h1>

    <!-- 3. Elemen div dengan kelas feature-card-container -->
    <div class="feature-card-container">

        <!-- 4, 5, 6 & 7. Label pertama (kelas feature-card, berisi teks dan input checkbox) -->
        <label class="feature-card" for="feat-fsr">
            AMD FSR 3.0
            <input type="checkbox" id="feat-fsr"/> 
        </label>
        
        <!-- 4, 5, 6 & 7. Label kedua (kelas feature-card, berisi teks dan input checkbox) -->
        <label class="feature-card" for="feat-dlss">
            Nvidia DLSS 3.5
            <input type="checkbox" id="feat-dlss"/> 
        </label>

        <!-- Tambahan opsional untuk memperkaya fitur -->
        <label class="feature-card" for="feat-xess">
            Intel XeSS
            <input type="checkbox" id="feat-xess"/> 
        </label>

    </div>
</body>
</html>
